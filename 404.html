<style>
  .notfound {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem var(--gutter);
    background: var(--ivory);
    position: relative;
    overflow: hidden;
  }
  .notfound::before {
    content: '404';
    position: absolute;
    font-family: var(--font-display);
    font-size: clamp(14rem, 35vw, 28rem);
    color: transparent;
    -webkit-text-stroke: 1px rgba(11,11,13,0.07);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    letter-spacing: -0.04em;
    line-height: 1;
    white-space: nowrap;
  }
  .notfound-content { position: relative; z-index: 1; max-width: 640px; }
  .notfound-eyebrow { margin-bottom: 1.4rem; justify-content: center; }
  .notfound h1 {
    font-family: var(--font-display);
    font-size: clamp(3rem, 8vw, 7rem);
    text-transform: uppercase;
    line-height: 0.9;
    color: var(--jet);
    margin-bottom: 1.4rem;
  }
  .notfound p { color: var(--ink); font-size: 1.1rem; margin-bottom: 2.4rem; max-width: 42ch; margin-inline: auto; }
  .notfound-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .divider { margin: 1.4rem auto; }
</style>
